name: Deploy Hugo Site to GitHub Pages

on:
  push:
    branches:
      - main  # Trigger deploy on push to main branch
  pull_request:
    branches:
      - main  # Trigger deploy on pull request to main branch

jobs:
  build:
    runs-on: ubuntu-latest  # Use the latest Ubuntu image

    steps:
    # Step 1: Check out the repository
    - name: Checkout code
      uses: actions/checkout@v3
    
    # Step 2: Set up Hugo
    - name: Set up Hugo
      uses: peaceiris/actions-hugo@v2
      with:
        hugo_version: '0.124.0'  # Specify your Hugo version
    
    # Step 3: Build the Hugo site
    - name: Build the Hugo site
      run: hugo --minify  # Builds the site in the default public/ directory

    # Step 4: Deploy the Hugo site to GitHub Pages
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./public  # Path to the directory where Hugo builds the site
        publish_branch: gh-pages  # Branch where the site will be deployed
